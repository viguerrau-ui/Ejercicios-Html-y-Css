<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Formulario de prueba de HTML 12</h1>
    <form action="" method="get">
    <p>
        Nombre: <input type="text" required>
    </p>
    <p>
        Correo Electronico: <input type="email" required>
    </p>
    <p>
        URL: <input type="url" placeholder="Escribe la URL de tu página web personal" required>
    </p>
<p>
    Fecha: <input type="date">
</p>
<p>
    Tiempo: <input type="time">
</p>
<p>
    Fecha y hora: <input type="datetime">
</p>
<p>
    Mes: <input type="time">
</p>
<p>
    Semana: <input type="week">
</p>
<p>
    Numero (Min - 10; Max +10): <input type="number" maxlength="10ss" minlength="10ss">
</p>
<p>
    Telefono: <input type="tel">
</p>
<p>
    Termino de Busqueda: <input type="search">
</p>
<p>
    Color favorito: <input type="color">
</p>
<input type="submit">
</body>

</html>
